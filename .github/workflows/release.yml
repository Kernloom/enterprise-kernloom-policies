name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  compile-sign-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core
          path: kernloom-core
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core-registry
          path: kernloom-core-registry
      - uses: actions/checkout@v4
        with:
          repository: kernloom/enterprise-kernloom-registry
          path: enterprise-kernloom-registry
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-adapter-klshield
          path: kernloom-adapter-klshield
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-adapter-ziti
          path: kernloom-adapter-ziti
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: sigstore/cosign-installer@v3
      - run: cd kernloom-core && go run ./cmd/forge compile --policy-repo .. --core-registry ../kernloom-core-registry --enterprise-registry ../enterprise-kernloom-registry --output-dir /tmp/kernloom-policy-ci
      - run: |
          cp -a /tmp/kernloom-policy-ci/artifacts/. generated/artifacts/
          cp -a /tmp/kernloom-policy-ci/resolved/. generated/resolved/
          cp -a /tmp/kernloom-policy-ci/signed/. generated/signed/
          cp -a /tmp/kernloom-policy-ci/reports/. generated/reports/
      - run: mkdir -p dist
      - run: tar --sort=name --owner=0 --group=0 --numeric-owner -czf dist/enterprise-kernloom-policies-artifacts.tar.gz policies generated/artifacts generated/bundles generated/resolved generated/signed generated/reports
      - run: sha256sum dist/enterprise-kernloom-policies-artifacts.tar.gz > dist/checksums.txt
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/enterprise-kernloom-policies.spdx.json
      - run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt
      - run: cosign sign-blob --yes --output-signature dist/enterprise-kernloom-policies.spdx.json.sig --output-certificate dist/enterprise-kernloom-policies.spdx.json.pem dist/enterprise-kernloom-policies.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: enterprise-kernloom-policies-release-artifacts
          path: dist/
