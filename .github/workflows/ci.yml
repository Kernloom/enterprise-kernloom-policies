name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core
          path: kernloom-core
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core-registry
          path: kernloom-core-registry
      - uses: actions/checkout@v4
        with:
          repository: kernloom/enterprise-kernloom-registry
          path: enterprise-kernloom-registry
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: test -f policies/access/protect-production-admin-access.intent.kni
      - run: test -f policies/runtime/mitigate-abnormal-source-behavior.intent.kni
      - run: test -f policies/kernloom/runtime-actions-require-safety-metadata.intent.kni
      - run: cd kernloom-core && go run ./cmd/forge compile --policy-repo .. --core-registry ../kernloom-core-registry --enterprise-registry ../enterprise-kernloom-registry --output-dir /tmp/kernloom-policy-ci
